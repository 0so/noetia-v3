<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>NOETIAI — Sistema de inteligencia cognitiva</title>
<meta name="description" content="NOETIAI — sistema de inteligencia artificial orientado a la comprensión profunda y el razonamiento. Inteligencia de mercados, desarrollo y seguridad en tiempo real." />

<!-- Aura design system: tokens, fonts, liquid-glass, animate-shiny -->
<link rel="stylesheet" href="../_ds/aura-design-system-89f953f6-f3e0-4248-b68b-7b8728b92618/styles.css" />
<!-- Terminal/hacker companion face: monospace for data only -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" />

<link rel="stylesheet" href="app.css" />

<!-- Favicon (usa un asset ya existente; evita el 404 de /favicon.ico) -->
<link rel="icon" type="image/png" href="assets/logo-glow.png" />
</head>
<body>
  <!-- Fixed cinematic background: video (dimmed) + scan grid + top glow -->
  <div class="bg-stage" aria-hidden="true">
    <video id="bgvid" class="bg-video" autoplay muted loop playsinline></video>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="bg-vignette"></div>
  </div>

  <!-- SVG grain filter used by the shiny headline word -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="c3-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer><feFuncA type="linear" slope="0.06" /></feComponentTransfer>
      <feComposite operator="in" in2="SourceGraphic" />
      <feBlend in="SourceGraphic" mode="multiply" />
    </filter>
  </svg>

  <div id="root"></div>

  <!-- React 18.3.1 — builds de PRODUCCIón (idénticos en pantalla; sin warnings de dev) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="Bubbles.jsx"></script>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Terminal.jsx"></script>
  <script type="text/babel" src="Memory.jsx"></script>
  <script type="text/babel" src="DevSec.jsx"></script>
  <script type="text/babel" src="Philosophy.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
